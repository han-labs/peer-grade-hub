server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: peergradehub

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:peergradehub}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:peergrade}
    password: ${DB_PASSWORD:peergrade123}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-real-env}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  file:
    upload-dir: ${UPLOAD_DIR:uploads}
    max-file-size-mb: ${MAX_FILE_SIZE_MB:20}
