server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api

spring:
  application:
    name: peergradehub

  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE_MB:20}MB
      max-request-size: ${MAX_REQUEST_SIZE_MB:100}MB

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3307}/${DB_NAME:peergradehub}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Ho_Chi_Minh
    username: ${DB_USERNAME:peergrade}
    password: ${DB_PASSWORD:peergrade123}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false

app:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-in-real-env}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    remember-me-expiration-ms: ${JWT_REMEMBER_ME_EXPIRATION_MS:604800000}

  file:
    upload-dir: ${UPLOAD_DIR:uploads}
    max-file-size-mb: ${MAX_FILE_SIZE_MB:20}
logging:
  level:
    org.springframework.web: DEBUG
    org.springframework.boot.autoconfigure: DEBUG
    edu.hcmute.peergradehub: DEBUG
